<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>旅遊分帳 App（家庭結算版）</title>
  <meta name="theme-color" content="#2563eb" />
  <style>
    :root{
      --bg:#f4f6f8;--card:#fff;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--danger:#dc2626;
      --ok:#059669;--warn:#d97706;--border:#e5e7eb;--shadow:0 10px 28px rgba(0,0,0,.08);--radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1024px;margin:0 auto;padding:16px 14px 44px}
    .hero{padding:6px 2px 14px}
    .hero h1{margin:8px 0 8px;font-size:30px;line-height:1.15}
    .hero p{margin:0;color:var(--muted);font-size:14px}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:#eff6ff;color:var(--primary);font-size:12px;font-weight:800}
    .grid{display:grid;gap:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    h2{margin:0 0 12px;font-size:18px}
    .sub{margin:-4px 0 12px;color:var(--muted);font-size:13px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    @media (max-width:760px){.row,.row3{grid-template-columns:1fr}.hero h1{font-size:28px}}
    label{display:block;font-size:13px;color:var(--muted);font-weight:700;margin:0 0 6px}
    input,select,textarea{width:100%;border:1px solid var(--border);background:#fff;border-radius:14px;padding:12px 13px;font-size:16px;outline:none;color:var(--text)}
    textarea{min-height:90px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.12)}
    .btns{display:flex;gap:8px;flex-wrap:wrap}
    button{border:none;border-radius:14px;padding:11px 14px;font-size:15px;font-weight:800;cursor:pointer;background:var(--primary);color:#fff}
    button.secondary{background:#fff;color:var(--primary);border:1px solid #bfdbfe}
    button.ghost{background:#eef2ff;color:var(--primary)}
    button.danger{background:#fee2e2;color:var(--danger)}
    button.ok{background:#dcfce7;color:var(--ok)}
    button.warn{background:#ffedd5;color:var(--warn)}
    .list{display:grid;gap:10px}
    .family,.expense,.result-box{border:1px solid var(--border);border-radius:16px;padding:12px;background:#fff}
    .family-head,.expense-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .family-name,.expense-name{font-size:16px;font-weight:800}
    .mini{font-size:12px;color:var(--muted)}
    .members{display:grid;gap:8px;margin-top:8px}
    .member{border:1px dashed var(--border);border-radius:14px;padding:10px;display:grid;grid-template-columns:1.3fr .8fr auto;gap:8px;align-items:end}
    @media (max-width:760px){.member{grid-template-columns:1fr}}
    .checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
    .check-item{display:flex;align-items:center;gap:10px;border:1px solid var(--border);background:#fff;border-radius:14px;padding:10px 12px}
    .check-item input{width:18px;height:18px;margin:0;accent-color:var(--primary)}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px 8px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
    th{color:var(--muted);font-weight:800}
    .money{font-variant-numeric:tabular-nums}
    .right{text-align:right}
    .positive{color:var(--ok);font-weight:800}
    .negative{color:var(--danger);font-weight:800}
    .muted{color:var(--muted)}
    .footer-note{margin-top:12px;color:var(--muted);font-size:12px;line-height:1.6}
    .stack{display:grid;gap:10px}
    .hidden{display:none!important}
    .tag{display:inline-block;background:#f3f4f6;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}
    .status{padding:10px 12px;border-radius:12px;background:#f8fafc;border:1px solid var(--border);font-size:13px;color:var(--muted);line-height:1.5}
    .line-box{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:14px;font-size:14px;line-height:1.7}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="pill">家庭結算版・點連結就能用</div>
    <h1>旅遊分帳 App</h1>
    <p>只顯示各家庭結算與家庭間轉帳，不顯示成員結算。</p>
  </div>

  <div class="grid">
    <section class="card">
      <h2>1. 旅遊基本設定</h2>
      <div class="row">
        <div><label>旅程名稱</label><input id="tripName" placeholder="例如：東京親子五日遊"></div>
        <div><label>幣別</label>
          <select id="currency">
            <option value="NT$">NT$</option><option value="¥">¥</option><option value="$">$</option><option value="€">€</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div><label>家庭間分帳方式</label>
          <select id="familySplitMode">
            <option value="equal">依家庭平均</option>
            <option value="memberCount">依家庭人數</option>
            <option value="familyWeight">依家庭權重</option>
          </select>
        </div>
        <div><label>家庭內分帳方式</label>
          <select id="memberSplitMode">
            <option value="equal">家庭內平均</option>
            <option value="memberWeight">家庭內依成員權重</option>
          </select>
        </div>
      </div>
      <div class="btns" style="margin-top:12px">
        <button class="secondary" onclick="saveLocal()">儲存本機</button>
        <button class="ghost" onclick="exportJson()">匯出 JSON</button>
        <button class="ghost" onclick="triggerImport()">匯入 JSON</button>
        <button class="warn" onclick="exportCSV()">匯出 CSV</button>
        <button class="ok" onclick="syncNow()">立即同步</button>
        <button class="danger" onclick="resetAll()">清空全部</button>
        <input id="importFile" type="file" accept=".json,application/json" class="hidden" onchange="importJson(event)">
      </div>
    </section>

    <section class="card">
      <h2>2. 同步狀態</h2>
      <p class="sub">這版已內建 Firebase，不用再填 apiKey / projectId。</p>
      <div class="row">
        <div><label>共用房號</label><input id="roomInfo" value="family-trip" readonly></div>
        <div><label>你的名稱（同步標記）</label><input id="editorName" placeholder="例如：品宏 / 媽媽 / 阿哲"></div>
      </div>
      <div class="btns" style="margin-top:12px">
        <button class="ghost" onclick="saveEditorName()">儲存名稱</button>
      </div>
      <div id="syncStatus" class="status" style="margin-top:10px">正在連線雲端…</div>
    </section>

    <section class="card">
      <h2>3. 新增家庭</h2>
      <p class="sub">可建立多個家庭，每個家庭可再加入多位成員。</p>
      <div class="row3">
        <div><label>家庭名稱</label><input id="newFamilyName" placeholder="例如：林家"></div>
        <div><label>家庭權重</label><input id="newFamilyWeight" type="number" min="0" step="0.1" value="1"></div>
        <div style="display:flex;align-items:end"><button style="width:100%" onclick="addFamily()">新增家庭</button></div>
      </div>
      <div id="familyList" class="list" style="margin-top:14px"></div>
    </section>

    <section class="card">
      <h2>4. 新增支出</h2>
      <p class="sub">每筆支出可指定分類、付款人、參與家庭。</p>
      <div class="stack">
        <div class="row3">
          <div><label>支出項目</label><input id="expenseTitle" placeholder="例如：租車 / 晚餐 / 門票"></div>
          <div><label>分類</label>
            <select id="expenseCategory">
              <option value="餐費">餐費</option>
              <option value="住宿">住宿</option>
              <option value="交通">交通</option>
              <option value="門票">門票</option>
              <option value="雜支">雜支</option>
            </select>
          </div>
          <div><label>金額</label><input id="expenseAmount" type="number" min="0" step="0.01" placeholder="0"></div>
        </div>
        <div class="row">
          <div><label>付款家庭</label><select id="payerFamily" onchange="refreshPayerMembers()"></select></div>
          <div><label>付款成員</label><select id="payerMember"></select></div>
        </div>
        <div>
          <label>參與分攤家庭</label>
          <div id="participantFamilies" class="checks"></div>
        </div>
        <div><label>備註</label><textarea id="expenseNote" placeholder="例如：全員晚餐 / 只有兩個家庭參與"></textarea></div>
        <div class="btns"><button onclick="addExpense()">新增支出</button></div>
      </div>
      <div id="expenseList" class="list" style="margin-top:14px"></div>
    </section>

    <section class="card">
      <h2>5. 分帳結果</h2>
      <div class="stack">
        <div class="result-box">
          <div class="family-head"><div class="family-name">總覽</div></div>
          <table><tbody>
            <tr><th>總支出</th><td id="summaryTotal" class="money right">-</td></tr>
            <tr><th>家庭數</th><td id="summaryFamilyCount" class="right">0</td></tr>
            <tr><th>成員數</th><td id="summaryMemberCount" class="right">0</td></tr>
            <tr><th>支出筆數</th><td id="summaryExpenseCount" class="right">0</td></tr>
          </tbody></table>
        </div>

        <div class="result-box">
          <div class="family-head"><div class="family-name">分類統計</div></div>
          <div id="categoryTable"></div>
        </div>

        <div class="result-box">
          <div class="family-head"><div class="family-name">各家庭結算</div></div>
          <div id="familyResultTable"></div>
        </div>

        <div class="result-box">
          <div class="family-head"><div class="family-name">各成員結算</div></div>
          <div id="memberResultTable"></div>
        </div>

        <div class="result-box">
          <div class="family-head"><div class="family-name">建議轉帳清單</div></div>
          <div id="settlementList"></div>
          <div class="footer-note">系統會依各家庭最終淨額，盡量縮減家庭間轉帳筆數。</div>
        </div>

        <div class="result-box">
          <div class="family-head">
            <div class="family-name">LINE 轉帳格式</div>
            <div class="btns"><button class="ghost" onclick="copyLineText()">複製文字</button></div>
          </div>
          <div id="lineTransferText" class="line-box">目前無需轉帳</div>
        </div>
      </div>
    </section>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeKbflcjh4LLn8u7J6V0xJAfV177YCyhA",
  authDomain: "go-play-5de22.firebaseapp.com",
  projectId: "go-play-5de22",
  storageBucket: "go-play-5de22.firebasestorage.app",
  messagingSenderId: "466483352315",
  appId: "1:466483352315:web:fbd27678ec5a0b433c165e"
};

const ROOM_ID = "family-trip";
const STORAGE_KEY = "travelSplitFinalLocal_v1";
const EDITOR_KEY = "travelSplitFinalEditor_v1";

let state = {tripName:'',currency:'NT$',familySplitMode:'equal',memberSplitMode:'equal',families:[],expenses:[]};
let suppressRemote = false;
let pushTimer = null;

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const roomDocRef = doc(db, "travelRooms", ROOM_ID);

function uid(){ return Math.random().toString(36).slice(2,10); }
function nowIso(){ return new Date().toISOString(); }
function money(n){ const cur=state.currency||'NT$'; return `${cur} ${Number(n||0).toFixed(2)}`; }
function escapeHtml(str){ return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function escapeAttr(str){ return escapeHtml(str); }
function getEditorName(){ return localStorage.getItem(EDITOR_KEY) || ''; }
function setStatus(msg){ document.getElementById('syncStatus').textContent = msg; }

function saveEditorName(){
  const name = document.getElementById('editorName').value.trim();
  localStorage.setItem(EDITOR_KEY, name);
  saveLocal(true);
  queueSync();
  setStatus(`已儲存名稱：${name || '未命名使用者'}`);
}
function markMeta(){
  state.__meta = {
    updatedAt: nowIso(),
    editorName: getEditorName() || '未命名使用者'
  };
}
function saveLocal(render=true){
  state.tripName = document.getElementById('tripName').value.trim();
  state.currency = document.getElementById('currency').value;
  state.familySplitMode = document.getElementById('familySplitMode').value;
  state.memberSplitMode = document.getElementById('memberSplitMode').value;
  markMeta();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if(render) renderAll();
}
function loadLocal(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{ state = JSON.parse(raw); }catch(e){}
  }
}
function queueSync(){
  clearTimeout(pushTimer);
  pushTimer = setTimeout(syncNow, 700);
}
async function syncNow(){
  try{
    saveLocal(false);
    suppressRemote = true;
    await setDoc(roomDocRef, {
      state,
      updatedAt: nowIso(),
      editorName: getEditorName() || '未命名使用者'
    });
    setTimeout(()=> suppressRemote = false, 600);
    setStatus(`已同步｜${getEditorName() || '未命名使用者'}｜${state.__meta?.updatedAt || ''}`);
  }catch(err){
    suppressRemote = false;
    setStatus('同步失敗，請確認 Firestore 規則已開放');
  }
}
async function initCloud(){
  try{
    const snap = await getDoc(roomDocRef);
    if(!snap.exists()){
      markMeta();
      await setDoc(roomDocRef, {
        state,
        updatedAt: nowIso(),
        editorName: getEditorName() || '未命名使用者'
      });
    }else{
      const data = snap.data();
      if(data?.state){
        state = data.state;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }
    }
    onSnapshot(roomDocRef, (docSnap) => {
      if(!docSnap.exists()) return;
      const data = docSnap.data();
      if(!data?.state) return;
      if(suppressRemote) return;
      const remote = JSON.stringify(data.state);
      const local = JSON.stringify(state);
      if(remote === local) return;
      state = data.state;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
      setStatus(`已收到同步｜${data.editorName || '其他裝置'}｜${data.updatedAt || ''}`);
    });
    setStatus('雲端連線成功，已啟用自動同步');
  }catch(err){
    setStatus('雲端連線失敗，請先到 Firebase 開啟 Firestore 並設定規則');
  }
}

function triggerImport(){ document.getElementById('importFile').click(); }
function exportJson(){
  saveLocal(false);
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.tripName || '旅遊分帳備份') + '.json';
  a.click();
}
function importJson(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const imported = JSON.parse(reader.result);
      if(!imported.families || !imported.expenses) throw new Error('bad');
      state = imported;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
      queueSync();
      alert('匯入完成');
    }catch(err){ alert('匯入失敗，請確認 JSON 格式正確'); }
    e.target.value='';
  };
  reader.readAsText(file,'utf-8');
}
function csvCell(v){
  const s = String(v ?? '');
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}
function totalAmount(){ return state.expenses.reduce((s,e)=>s+Number(e.amount||0),0); }
function exportCSV(){
  saveLocal(false);
  const {familyRows, settlements, categoryRows} = calculate();
  const lines = [];
  const addSection = (title, rows) => { lines.push(title); rows.forEach(r => lines.push(r.map(csvCell).join(','))); lines.push(''); };
  addSection('總覽', [
    ['旅程名稱', state.tripName || ''],
    ['幣別', state.currency || ''],
    ['總支出', totalAmount()],
    ['家庭數', state.families.length],
    ['成員數', state.families.reduce((s,f)=>s+(f.members?.length||0),0)],
    ['支出筆數', state.expenses.length]
  ]);
  addSection('分類統計', [['分類','金額']].concat(categoryRows.map(r=>[r.category, r.amount.toFixed(2)])));
  addSection('各家庭結算', [['家庭','已付款','應分攤','淨額']].concat(familyRows.map(r=>[r.familyName,r.paid.toFixed(2),r.owed.toFixed(2),r.net.toFixed(2)])));
  addSection('建議轉帳清單', [['付款方','收款方','金額']].concat(settlements.map(s=>[s.from,s.to,s.amount.toFixed(2)])));
  const csv = '\ufeff' + lines.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.tripName || '旅遊分帳報表') + '.csv';
  a.click();
}
function resetAll(){
  if(!confirm('確定要清空全部資料嗎？')) return;
  state = {tripName:'',currency:'NT$',familySplitMode:'equal',memberSplitMode:'equal',families:[],expenses:[]};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  renderAll();
  queueSync();
}
function addFamily(){
  const name = document.getElementById('newFamilyName').value.trim();
  const weight = Number(document.getElementById('newFamilyWeight').value || 1);
  if(!name){ alert('請先輸入家庭名稱'); return; }
  state.families.push({id:uid(),name,weight:weight>0?weight:1,members:[]});
  document.getElementById('newFamilyName').value=''; document.getElementById('newFamilyWeight').value='1';
  saveLocal(); queueSync();
}
function removeFamily(familyId){
  const family = state.families.find(f=>f.id===familyId); if(!family) return;
  if(!confirm(`刪除家庭「${family.name}」？相關付款與分攤資料會一起調整。`)) return;
  state.expenses = state.expenses.filter(ex => ex.payerFamilyId !== familyId && !ex.participantFamilyIds.includes(familyId));
  state.families = state.families.filter(f=>f.id!==familyId);
  saveLocal(); queueSync();
}
function updateFamilyName(familyId,v){ const f=state.families.find(x=>x.id===familyId); if(f){f.name=v; saveLocal(false); renderFamilies(); renderExpenseInputs(); renderExpenses(); renderResults(); queueSync();} }
function updateFamilyWeight(familyId,v){ const f=state.families.find(x=>x.id===familyId); if(f){ const n=Number(v||1); f.weight=n>0?n:1; saveLocal(false); renderResults(); queueSync();} }
function addMember(familyId){ const f=state.families.find(x=>x.id===familyId); if(f){ f.members.push({id:uid(),name:'新成員',weight:1}); saveLocal(); queueSync(); } }
function updateMember(familyId,memberId,field,v){
  const f=state.families.find(x=>x.id===familyId); const m=f?.members.find(x=>x.id===memberId); if(!m) return;
  if(field==='weight'){ const n=Number(v||1); m.weight=n>0?n:1; } else { m[field]=v; }
  saveLocal(false); renderFamilies(); renderExpenseInputs(); renderExpenses(); renderResults(); queueSync();
}
function removeMember(familyId,memberId){
  const f=state.families.find(x=>x.id===familyId); const m=f?.members.find(x=>x.id===memberId); if(!f||!m) return;
  if(state.expenses.some(ex => ex.payerMemberId === memberId)){ alert('此成員已有付款紀錄，請先修改或刪除相關支出。'); return; }
  f.members = f.members.filter(x=>x.id!==memberId); saveLocal(); queueSync();
}
function refreshPayerMembers(){
  const payerFamilyId = document.getElementById('payerFamily').value;
  const memberSelect = document.getElementById('payerMember');
  const family = state.families.find(f=>f.id===payerFamilyId);
  const members = family?.members || [];
  memberSelect.innerHTML = members.map(m=>`<option value="${m.id}">${escapeHtml(m.name)}</option>`).join('');
}
function addExpense(){
  if(state.families.length===0){ alert('請先新增家庭'); return; }
  const title = document.getElementById('expenseTitle').value.trim();
  const category = document.getElementById('expenseCategory').value;
  const amount = Number(document.getElementById('expenseAmount').value || 0);
  const payerFamilyId = document.getElementById('payerFamily').value;
  const payerMemberId = document.getElementById('payerMember').value;
  const participantFamilyIds = [...document.querySelectorAll('.participant-family:checked')].map(el=>el.value);
  const note = document.getElementById('expenseNote').value.trim();
  if(!title){ alert('請輸入支出項目'); return; }
  if(!(amount > 0)){ alert('請輸入正確金額'); return; }
  if(!payerFamilyId || !payerMemberId){ alert('請選擇付款家庭與付款成員'); return; }
  if(participantFamilyIds.length===0){ alert('請至少勾選一個參與分攤家庭'); return; }
  state.expenses.push({id:uid(),title,category,amount,payerFamilyId,payerMemberId,participantFamilyIds,note});
  document.getElementById('expenseTitle').value=''; document.getElementById('expenseAmount').value=''; document.getElementById('expenseNote').value='';
  document.querySelectorAll('.participant-family').forEach(chk => chk.checked = true);
  saveLocal(); queueSync();
}
function removeExpense(id){ state.expenses = state.expenses.filter(e=>e.id!==id); saveLocal(); queueSync(); }

function getFamilyShareWeights(selectedFamilies){
  if(state.familySplitMode === 'equal') return selectedFamilies.map(f=>({familyId:f.id,weight:1}));
  if(state.familySplitMode === 'memberCount') return selectedFamilies.map(f=>({familyId:f.id,weight:Math.max(1,f.members.length)}));
  return selectedFamilies.map(f=>({familyId:f.id,weight:Math.max(0.0001, Number(f.weight||1))}));
}
function distributeToMembers(family, familyAmount){
  const members = family.members || [];
  if(members.length===0) return [];
  if(state.memberSplitMode === 'equal'){
    const per = familyAmount / members.length;
    return members.map(m=>({memberId:m.id, amount:per}));
  }
  const totalWeight = members.reduce((s,m)=>s + Math.max(0.0001, Number(m.weight || 1)), 0);
  return members.map(m=>({memberId:m.id, amount: familyAmount * (Math.max(0.0001, Number(m.weight||1)) / totalWeight)}));
}

function calculate(){
  const families = state.families;
  const paidByFamily={}, owedByFamily={};
  const categoryMap = {};

  families.forEach(f=>{paidByFamily[f.id]=0; owedByFamily[f.id]=0;});

  for(const ex of state.expenses){
    const payerFamily = families.find(f=>f.id===ex.payerFamilyId);
    const selectedFamilies = families.filter(f=>ex.participantFamilyIds.includes(f.id));
    if(!payerFamily || selectedFamilies.length===0) continue;

    paidByFamily[payerFamily.id] += Number(ex.amount);
    categoryMap[ex.category || '未分類'] = (categoryMap[ex.category || '未分類'] || 0) + Number(ex.amount);

    const familyWeights = getFamilyShareWeights(selectedFamilies);
    const totalFamilyWeight = familyWeights.reduce((s,x)=>s + x.weight, 0);

    for(const fw of familyWeights){
      const family = families.find(f=>f.id===fw.familyId);
      if(!family) continue;
      const familyAmount = Number(ex.amount) * (fw.weight / totalFamilyWeight);
      owedByFamily[family.id] += familyAmount;
    }
  }

  const familyRows = families.map(f=>({
    familyId:f.id,
    familyName:f.name,
    paid:paidByFamily[f.id]||0,
    owed:owedByFamily[f.id]||0,
    net:(paidByFamily[f.id]||0)-(owedByFamily[f.id]||0)
  }));
  const settlements = buildSettlements(familyRows);
  const categoryRows = Object.entries(categoryMap).map(([category,amount])=>({category,amount})).sort((a,b)=>b.amount-a.amount);

  return {familyRows, settlements, categoryRows};
}
function buildSettlements(familyRows){
  const creditors = familyRows.filter(r=>r.net>0.005).map(r=>({...r,remain:r.net})).sort((a,b)=>b.remain-a.remain);
  const debtors = familyRows.filter(r=>r.net<-0.005).map(r=>({...r,remain:Math.abs(r.net)})).sort((a,b)=>b.remain-a.remain);
  const list=[]; let i=0,j=0;
  while(i<debtors.length && j<creditors.length){
    const d=debtors[i], c=creditors[j];
    const amt=Math.min(d.remain,c.remain);
    if(amt>0.005) list.push({from:d.familyName, to:c.familyName, amount:amt});
    d.remain-=amt; c.remain-=amt;
    if(d.remain<=0.005) i++;
    if(c.remain<=0.005) j++;
  }
  return list;
}
function renderFamilies(){

  const box = document.getElementById('familyList');
  if(state.families.length===0){ box.innerHTML = '<div class="muted">尚未新增家庭</div>'; return; }
  box.innerHTML = state.families.map(f => `

      <div class="family-head">
        <div class="family-name">${escapeHtml(f.name)}</div>
        <div class="btns">
          <span class="pill">權重 ${Number(f.weight || 1)}</span>
          <button class="ghost" onclick="addMember('${f.id}')">+ 新增成員</button>
          <button class="danger" onclick="removeFamily('${f.id}')">刪除家庭</button>
        </div>
      </div>
      <div class="row">
        <div><label>家庭名稱</label><input value="${escapeAttr(f.name)}" oninput="updateFamilyName('${f.id}', this.value)"></div>
        <div><label>家庭權重</label><input type="number" min="0" step="0.1" value="${Number(f.weight || 1)}" oninput="updateFamilyWeight('${f.id}', this.value)"></div>
      </div>
      <div class="members">
        ${(f.members||[]).length===0 ? '<div class="mini">尚未新增成員</div>' : ''}
        ${(f.members||[]).map(m => `
          <div class="member">
            <div><label>成員名稱</label><input value="${escapeAttr(m.name)}" oninput="updateMember('${f.id}','${m.id}','name',this.value)"></div>
            <div><label>成員權重</label><input type="number" min="0" step="0.1" value="${Number(m.weight || 1)}" oninput="updateMember('${f.id}','${m.id}','weight',this.value)"></div>
            <div><button class="danger" onclick="removeMember('${f.id}','${m.id}')">刪除成員</button></div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}
function renderExpenseInputs(){
  const payerFamily = document.getElementById('payerFamily');
  const participantFamilies = document.getElementById('participantFamilies');
  payerFamily.innerHTML = state.families.map(f=>`<option value="${f.id}">${escapeHtml(f.name)}</option>`).join('');
  participantFamilies.innerHTML = state.families.map(f => `
    <label class="check-item">
      <input class="participant-family" type="checkbox" value="${f.id}" checked>
      <span>${escapeHtml(f.name)}</span>
    </label>
  `).join('');
  refreshPayerMembers();
}
function renderExpenses(){
  const box = document.getElementById('expenseList');
  if(state.expenses.length===0){ box.innerHTML = '<div class="muted">尚未新增支出</div>'; return; }
  box.innerHTML = state.expenses.map((ex,idx) => {
    const pf = state.families.find(f=>f.id===ex.payerFamilyId);
    const pm = pf?.members.find(m=>m.id===ex.payerMemberId);
    const parts = state.families.filter(f=>ex.participantFamilyIds.includes(f.id)).map(f=>f.name).join('、');
    return `
      <div class="expense">
        <div class="expense-head">
          <div>
            <div class="expense-name">${idx+1}. ${escapeHtml(ex.title)}</div>
            <div class="mini">分類：<span class="tag">${escapeHtml(ex.category || '未分類')}</span>　付款人：${escapeHtml(pf?.name||'-')}｜${escapeHtml(pm?.name||'-')}</div>
          </div>
          <div class="btns">
            <span class="pill money">${money(ex.amount)}</span>
            <button class="danger" onclick="removeExpense('${ex.id}')">刪除</button>
          </div>
        </div>
        <div class="mini">參與家庭：${escapeHtml(parts || '-')}</div>
        ${ex.note ? `<div class="mini" style="margin-top:6px">備註：${escapeHtml(ex.note)}</div>` : ''}
      </div>
    `;
  }).join('');
}
function renderResults(){
  const total = totalAmount();
  const memberCount = state.families.reduce((s,f)=>s+(f.members?.length||0),0);
  document.getElementById('summaryTotal').textContent = money(total);
  document.getElementById('summaryFamilyCount').textContent = state.families.length;
  document.getElementById('summaryMemberCount').textContent = memberCount;
  document.getElementById('summaryExpenseCount').textContent = state.expenses.length;

  const {familyRows, settlements, categoryRows} = calculate();
  document.getElementById('categoryTable').innerHTML = categoryRows.length===0 ? '<div class="muted">無資料</div>' : `
    <table><thead><tr><th>分類</th><th class="right">金額</th></tr></thead><tbody>
    ${categoryRows.map(r=>`<tr><td>${escapeHtml(r.category)}</td><td class="right money">${money(r.amount)}</td></tr>`).join('')}
    </tbody></table>`;
  document.getElementById('familyResultTable').innerHTML = familyRows.length===0 ? '<div class="muted">無資料</div>' : `
    <table><thead><tr><th>家庭</th><th class="right">已付款</th><th class="right">應分攤</th><th class="right">淨額</th></tr></thead><tbody>
      ${familyRows.map(r=>`<tr><td>${escapeHtml(r.familyName)}</td><td class="right money">${money(r.paid)}</td><td class="right money">${money(r.owed)}</td><td class="right money ${r.net>=0?'positive':'negative'}">${money(r.net)}</td></tr>`).join('')}
    </tbody></table>`;
  document.getElementById('memberResultTable').innerHTML = memberRows.length===0 ? '<div class="muted">無資料</div>' : `
    <table><thead><tr><th>成員</th><th>家庭</th><th class="right">已付款</th><th class="right">應分攤</th><th class="right">淨額</th></tr></thead><tbody>
      ${memberRows.map(r=>`<tr><td>${escapeHtml(r.memberName)}</td><td>${escapeHtml(r.familyName)}</td><td class="right money">${money(r.paid)}</td><td class="right money">${money(r.owed)}</td><td class="right money ${r.net>=0?'positive':'negative'}">${money(r.net)}</td></tr>`).join('')}
    </tbody></table>`;
  document.getElementById('settlementList').innerHTML = settlements.length===0 ? '<div class="muted">目前無需轉帳</div>' : `
    <table><thead><tr><th>付款方</th><th>收款方</th><th class="right">金額</th></tr></thead><tbody>
      ${settlements.map(s=>`<tr><td>${escapeHtml(s.from)}</td><td>${escapeHtml(s.to)}</td><td class="right money">${money(s.amount)}</td></tr>`).join('')}
    </tbody></table>`;
  const lineText = settlements.length===0 ? '目前無需轉帳' : settlements.map(s => `${s.from} → ${s.to}：${money(s.amount)}`).join('\n');
  document.getElementById('lineTransferText').textContent = lineText;
}
function copyLineText(){
  const text = document.getElementById('lineTransferText').textContent;
  navigator.clipboard.writeText(text).then(()=>alert('已複製 LINE 轉帳文字'));
}
