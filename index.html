<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>旅遊分帳 App（多帳本版）</title>
  <meta name="theme-color" content="#2563eb" />
  <style>
    :root{
      --bg:#f4f6f8;--card:#fff;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--danger:#dc2626;
      --ok:#059669;--warn:#d97706;--border:#e5e7eb;--shadow:0 10px 28px rgba(0,0,0,.08);--radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:16px 14px 44px}
    .hero{padding:6px 2px 14px}
    .hero h1{margin:8px 0 8px;font-size:30px;line-height:1.15}
    .hero p{margin:0;color:var(--muted);font-size:14px}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:#eff6ff;color:var(--primary);font-size:12px;font-weight:800}
    .grid{display:grid;gap:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:16px}
    h2{margin:0 0 12px;font-size:18px}
    .sub{margin:-4px 0 12px;color:var(--muted);font-size:13px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
    @media (max-width:760px){.row,.row3,.row4{grid-template-columns:1fr}.hero h1{font-size:28px}}
    label{display:block;font-size:13px;color:var(--muted);font-weight:700;margin:0 0 6px}
    input,select,textarea{width:100%;border:1px solid var(--border);background:#fff;border-radius:14px;padding:12px 13px;font-size:16px;outline:none;color:var(--text)}
    textarea{min-height:90px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.12)}
    .btns{display:flex;gap:8px;flex-wrap:wrap}
    button{border:none;border-radius:14px;padding:11px 14px;font-size:15px;font-weight:800;cursor:pointer;background:var(--primary);color:#fff}
    button.secondary{background:#fff;color:var(--primary);border:1px solid #bfdbfe}
    button.ghost{background:#eef2ff;color:var(--primary)}
    button.danger{background:#fee2e2;color:var(--danger)}
    button.ok{background:#dcfce7;color:var(--ok)}
    button.warn{background:#ffedd5;color:var(--warn)}
    .list{display:grid;gap:10px}
    .family,.entry,.result-box,.book-item{border:1px solid var(--border);border-radius:16px;padding:12px;background:#fff}
    .family-head,.entry-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .family-name,.entry-name{font-size:16px;font-weight:800}
    .mini{font-size:12px;color:var(--muted)}
    .checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
    .check-item{display:flex;align-items:center;gap:10px;border:1px solid var(--border);background:#fff;border-radius:14px;padding:10px 12px}
    .check-item input{width:18px;height:18px;margin:0;accent-color:var(--primary)}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px 8px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
    th{color:var(--muted);font-weight:800}
    .money{font-variant-numeric:tabular-nums}
    .right{text-align:right}
    .positive{color:var(--ok);font-weight:800}
    .negative{color:var(--danger);font-weight:800}
    .muted{color:var(--muted)}
    .footer-note{margin-top:12px;color:var(--muted);font-size:12px;line-height:1.6}
    .stack{display:grid;gap:10px}
    .hidden{display:none!important}
    .tag{display:inline-block;background:#f3f4f6;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}
    .tag.income{background:#dcfce7;color:#166534}
    .tag.expense{background:#fee2e2;color:#991b1b}
    .line-box{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:14px;font-size:14px;line-height:1.7}
    .book-item.active{border-color:#93c5fd;background:#eff6ff}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="pill">多帳本版・自訂名稱</div>
    <h1>旅遊分帳 App</h1>
    <p>可用自訂名稱建立多本分帳表，並在同一頁切換使用。每本帳都可獨立記錄收入、支出與家庭結算。</p>
  </div>

  <div class="grid">
    <section class="card">
      <h2>1. 分帳表管理</h2>
      <p class="sub">可建立多本帳，例如：沖繩旅行、墾丁住宿、家庭聚餐。每本帳會分開保存。</p>
      <div class="row3">
        <div><label>新帳本名稱</label><input id="newBookName" placeholder="例如：沖繩四天三夜"></div>
        <div><label>目前帳本</label><input id="currentBookName" readonly></div>
        <div style="display:flex;align-items:end"><button style="width:100%" onclick="addBook()">新增帳本</button></div>
      </div>
      <div id="bookList" class="list" style="margin-top:14px"></div>
    </section>

    <section class="card">
      <h2>2. 帳本基本設定</h2>
      <div class="row3">
        <div><label>旅程名稱</label><input id="tripName" placeholder="例如：東京親子五日遊"></div>
        <div><label>幣別</label>
          <select id="currency">
            <option value="NT$">NT$</option><option value="¥">¥</option><option value="$">$</option><option value="€">€</option>
          </select>
        </div>
        <div><label>家庭間分帳方式</label>
          <select id="familySplitMode">
            <option value="equal">依家庭平均</option>
            <option value="familyWeight">依家庭權重</option>
          </select>
        </div>
      </div>
      <div class="btns" style="margin-top:12px">
        <button class="secondary" onclick="saveLocal()">儲存本機</button>
        <button class="ghost" onclick="exportJson()">匯出 JSON</button>
        <button class="ghost" onclick="triggerImport()">匯入 JSON</button>
        <button class="warn" onclick="exportCSV()">匯出 CSV</button>
        <button class="danger" onclick="resetCurrentBook()">清空目前帳本</button>
        <input id="importFile" type="file" accept=".json,application/json" class="hidden" onchange="importJson(event)">
      </div>
    </section>

    <section class="card">
      <h2>3. 新增家庭</h2>
      <div class="row3">
        <div><label>家庭名稱</label><input id="newFamilyName" placeholder="例如：林家"></div>
        <div><label>家庭權重</label><input id="newFamilyWeight" type="number" min="0" step="0.1" value="1"></div>
        <div style="display:flex;align-items:end"><button style="width:100%" onclick="addFamily()">新增家庭</button></div>
      </div>
      <div id="familyList" class="list" style="margin-top:14px"></div>
    </section>

    <section class="card">
      <h2>4. 新增或編輯紀錄</h2>
      <div class="stack">
        <div class="row4">
          <div><label>類型</label>
            <select id="entryType">
              <option value="expense">支出</option>
              <option value="income">收入</option>
            </select>
          </div>
          <div><label>項目名稱</label><input id="expenseTitle" placeholder="例如：租車 / 回饋金 / 退稅"></div>
          <div><label>分類</label>
            <select id="expenseCategory">
              <option value="餐費">餐費</option>
              <option value="住宿">住宿</option>
              <option value="交通">交通</option>
              <option value="門票">門票</option>
              <option value="雜支">雜支</option>
              <option value="收入">收入</option>
            </select>
          </div>
          <div><label>金額</label><input id="expenseAmount" type="number" min="0" step="0.01" placeholder="0"></div>
        </div>
        <div class="row">
          <div><label>紀錄家庭（支出付款家庭 / 收入歸屬家庭）</label><select id="payerFamily"></select></div>
          <div><label>備註</label><input id="expenseNote" placeholder="例如：全員晚餐 / 退稅回補"></div>
        </div>
        <div>
          <label>參與分攤家庭（只有支出會使用）</label>
          <div id="participantFamilies" class="checks"></div>
        </div>
        <div class="btns">
          <button id="saveEntryBtn" onclick="saveEntry()">新增紀錄</button>
          <button class="secondary hidden" id="cancelEditBtn" onclick="cancelEdit()">取消編輯</button>
        </div>
      </div>
      <div id="entryList" class="list" style="margin-top:14px"></div>
    </section>

    <section class="card">
      <h2>5. 結算結果</h2>
      <div class="stack">
        <div class="result-box">
          <div class="family-head"><div class="family-name">總覽</div></div>
          <table><tbody>
            <tr><th>總支出</th><td id="summaryExpenseTotal" class="money right">-</td></tr>
            <tr><th>總收入</th><td id="summaryIncomeTotal" class="money right">-</td></tr>
            <tr><th>淨支出</th><td id="summaryNetTotal" class="money right">-</td></tr>
            <tr><th>家庭數</th><td id="summaryFamilyCount" class="right">0</td></tr>
            <tr><th>紀錄筆數</th><td id="summaryEntryCount" class="right">0</td></tr>
          </tbody></table>
        </div>

        <div class="result-box">
          <div class="family-head"><div class="family-name">分類統計</div></div>
          <div id="categoryTable"></div>
        </div>

        <div class="result-box">
          <div class="family-head"><div class="family-name">各家庭結算</div></div>
          <div id="familyResultTable"></div>
        </div>

        <div class="result-box">
          <div class="family-head"><div class="family-name">家庭間轉帳清單</div></div>
          <div id="settlementList"></div>
        </div>

        <div class="result-box">
          <div class="family-head"><div class="family-name">LINE 轉帳格式</div><div class="btns"><button class="ghost" onclick="copyLineText()">複製文字</button></div></div>
          <div id="lineTransferText" class="line-box">目前無需轉帳</div>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
const STORAGE_KEY = "travelSplitMultiBook_v1";
let appData = { activeBookId: null, books: [] };
let editingId = null;

function uid(){ return Math.random().toString(36).slice(2,10); }
function defaultBook(name="未命名分帳表"){
  return {
    id: uid(),
    bookName: name,
    tripName: '',
    currency: 'NT$',
    familySplitMode: 'equal',
    families: [],
    entries: []
  };
}
function activeBook(){
  return appData.books.find(b => b.id === appData.activeBookId);
}
function saveStorage(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
}
function loadStorage(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{ appData = JSON.parse(raw); }catch(e){}
  }
  if(!appData.books || appData.books.length===0){
    const b = defaultBook("我的第一本分帳表");
    appData = { activeBookId: b.id, books: [b] };
    saveStorage();
  }
  if(!appData.activeBookId || !activeBook()){
    appData.activeBookId = appData.books[0].id;
  }
}
function money(n){
  const b = activeBook();
  const cur = b?.currency || 'NT$';
  return `${cur} ${Number(n||0).toFixed(2)}`;
}
function escapeHtml(str){ return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }

function addBook(){
  const name = document.getElementById('newBookName').value.trim();
  if(!name){ alert('請先輸入帳本名稱'); return; }
  const b = defaultBook(name);
  appData.books.push(b);
  appData.activeBookId = b.id;
  document.getElementById('newBookName').value = '';
  editingId = null;
  saveStorage();
  renderAll();
}
function switchBook(id){
  appData.activeBookId = id;
  editingId = null;
  saveStorage();
  renderAll();
}
function renameBook(id){
  const b = appData.books.find(x=>x.id===id);
  if(!b) return;
  const name = prompt('請輸入新的帳本名稱', b.bookName);
  if(!name) return;
  b.bookName = name.trim();
  saveStorage();
  renderAll();
}
function deleteBook(id){
  const b = appData.books.find(x=>x.id===id);
  if(!b) return;
  if(appData.books.length === 1){
    alert('至少要保留一本分帳表');
    return;
  }
  if(!confirm(`確定刪除帳本「${b.bookName}」？`)) return;
  appData.books = appData.books.filter(x=>x.id!==id);
  if(appData.activeBookId === id){
    appData.activeBookId = appData.books[0].id;
  }
  editingId = null;
  saveStorage();
  renderAll();
}
function resetCurrentBook(){
  const b = activeBook();
  if(!b) return;
  if(!confirm(`確定清空目前帳本「${b.bookName}」？`)) return;
  b.tripName = '';
  b.currency = 'NT$';
  b.familySplitMode = 'equal';
  b.families = [];
  b.entries = [];
  editingId = null;
  saveStorage();
  renderAll();
}
function saveLocal(){
  const b = activeBook();
  if(!b) return;
  b.tripName = document.getElementById('tripName').value.trim();
  b.currency = document.getElementById('currency').value;
  b.familySplitMode = document.getElementById('familySplitMode').value;
  saveStorage();
}
function addFamily(){
  const b = activeBook();
  const name = document.getElementById('newFamilyName').value.trim();
  const weight = Number(document.getElementById('newFamilyWeight').value || 1);
  if(!name){ alert('請先輸入家庭名稱'); return; }
  b.families.push({id:uid(), name, weight:weight>0?weight:1});
  document.getElementById('newFamilyName').value = '';
  document.getElementById('newFamilyWeight').value = '1';
  saveStorage();
  renderAll();
}
function updateFamilyName(id, value){
  const f = activeBook().families.find(x=>x.id===id);
  if(!f) return;
  f.name = value;
  saveStorage();
  renderAll();
}
function updateFamilyWeight(id, value){
  const f = activeBook().families.find(x=>x.id===id);
  if(!f) return;
  const n = Number(value||1);
  f.weight = n>0?n:1;
  saveStorage();
  renderResults();
}
function removeFamily(id){
  const b = activeBook();
  const f = b.families.find(x=>x.id===id);
  if(!f) return;
  if(!confirm(`刪除家庭「${f.name}」？相關紀錄會一起調整。`)) return;
  b.entries = b.entries.filter(e => e.payerFamilyId !== id && !(e.participantFamilyIds||[]).includes(id));
  b.families = b.families.filter(x=>x.id!==id);
  saveStorage();
  renderAll();
}
function renderEntryInputs(){
  const b = activeBook();
  const payer = document.getElementById('payerFamily');
  const parts = document.getElementById('participantFamilies');
  payer.innerHTML = b.families.map(f=>`<option value="${f.id}">${escapeHtml(f.name)}</option>`).join('');
  parts.innerHTML = b.families.map(f=>`
    <label class="check-item">
      <input class="participant-family" type="checkbox" value="${f.id}" checked>
      <span>${escapeHtml(f.name)}</span>
    </label>
  `).join('');
  onEntryTypeChange();
}
function onEntryTypeChange(){
  const type = document.getElementById('entryType').value;
  const wrap = document.getElementById('participantFamilies').parentElement;
  wrap.style.opacity = type === 'income' ? '0.5' : '1';
  if(type === 'income') document.getElementById('expenseCategory').value = '收入';
}
function clearEntryForm(){
  editingId = null;
  document.getElementById('entryType').value = 'expense';
  document.getElementById('expenseTitle').value = '';
  document.getElementById('expenseCategory').value = '餐費';
  document.getElementById('expenseAmount').value = '';
  document.getElementById('expenseNote').value = '';
  document.querySelectorAll('.participant-family').forEach(c=>c.checked = true);
  document.getElementById('saveEntryBtn').textContent = '新增紀錄';
  document.getElementById('cancelEditBtn').classList.add('hidden');
  onEntryTypeChange();
}
function fillEntryForm(entry){
  editingId = entry.id;
  document.getElementById('entryType').value = entry.type;
  document.getElementById('expenseTitle').value = entry.title || '';
  document.getElementById('expenseCategory').value = entry.category || (entry.type==='income'?'收入':'餐費');
  document.getElementById('expenseAmount').value = entry.amount || '';
  document.getElementById('payerFamily').value = entry.payerFamilyId || '';
  document.getElementById('expenseNote').value = entry.note || '';
  document.querySelectorAll('.participant-family').forEach(c=>c.checked = entry.type==='expense' ? (entry.participantFamilyIds||[]).includes(c.value) : false);
  document.getElementById('saveEntryBtn').textContent = '儲存修改';
  document.getElementById('cancelEditBtn').classList.remove('hidden');
  onEntryTypeChange();
}
function cancelEdit(){ clearEntryForm(); }
function saveEntry(){
  const b = activeBook();
  if(b.families.length===0){ alert('請先新增家庭'); return; }
  const type = document.getElementById('entryType').value;
  const title = document.getElementById('expenseTitle').value.trim();
  const category = document.getElementById('expenseCategory').value;
  const amount = Number(document.getElementById('expenseAmount').value || 0);
  const payerFamilyId = document.getElementById('payerFamily').value;
  const participantFamilyIds = [...document.querySelectorAll('.participant-family:checked')].map(el=>el.value);
  const note = document.getElementById('expenseNote').value.trim();

  if(!title){ alert('請輸入項目名稱'); return; }
  if(!(amount > 0)){ alert('請輸入正確金額'); return; }
  if(!payerFamilyId){ alert('請選擇家庭'); return; }
  if(type==='expense' && participantFamilyIds.length===0){ alert('支出請至少勾選一個參與分攤家庭'); return; }

  const entry = {
    id: editingId || uid(),
    type, title, category, amount, payerFamilyId,
    participantFamilyIds: type==='expense' ? participantFamilyIds : [],
    note
  };
  if(editingId){
    b.entries = b.entries.map(x => x.id===editingId ? entry : x);
  }else{
    b.entries.push(entry);
  }
  saveStorage();
  clearEntryForm();
  renderAll();
}
function editEntry(id){
  const e = activeBook().entries.find(x=>x.id===id);
  if(e) fillEntryForm(e);
}
function removeEntry(id){
  const b = activeBook();
  b.entries = b.entries.filter(x=>x.id!==id);
  if(editingId===id) clearEntryForm();
  saveStorage();
  renderAll();
}
function getFamilyShareWeights(selectedFamilies){
  const b = activeBook();
  if(b.familySplitMode === 'equal') return selectedFamilies.map(f=>({familyId:f.id, weight:1}));
  return selectedFamilies.map(f=>({familyId:f.id, weight:Math.max(0.0001, Number(f.weight||1))}));
}
function calculate(){
  const b = activeBook();
  const families = b.families;
  const expensePaid={}, expenseOwed={}, incomeReceived={};
  const categoryMap = {};
  let totalExpense = 0, totalIncome = 0;

  families.forEach(f=>{expensePaid[f.id]=0; expenseOwed[f.id]=0; incomeReceived[f.id]=0;});

  for(const ex of b.entries){
    const payerFamily = families.find(f=>f.id===ex.payerFamilyId);
    if(!payerFamily) continue;
    const key = `${ex.type}|${ex.category || '未分類'}`;
    categoryMap[key] = (categoryMap[key] || 0) + Number(ex.amount);

    if(ex.type === 'income'){
      incomeReceived[payerFamily.id] += Number(ex.amount);
      totalIncome += Number(ex.amount);
      continue;
    }
    const selectedFamilies = families.filter(f=>(ex.participantFamilyIds||[]).includes(f.id));
    if(selectedFamilies.length===0) continue;
    expensePaid[payerFamily.id] += Number(ex.amount);
    totalExpense += Number(ex.amount);
    const familyWeights = getFamilyShareWeights(selectedFamilies);
    const totalWeight = familyWeights.reduce((s,x)=>s+x.weight, 0);
    for(const fw of familyWeights){
      const familyAmount = Number(ex.amount) * (fw.weight / totalWeight);
      expenseOwed[fw.familyId] += familyAmount;
    }
  }

  const familyRows = families.map(f=>({
    familyId:f.id,
    familyName:f.name,
    expensePaid:expensePaid[f.id]||0,
    expenseOwed:expenseOwed[f.id]||0,
    incomeReceived:incomeReceived[f.id]||0,
    net:(expensePaid[f.id]||0) + (incomeReceived[f.id]||0) - (expenseOwed[f.id]||0)
  }));
  const settlements = buildSettlements(familyRows);
  const categoryRows = Object.entries(categoryMap).map(([key,amount])=>{
    const [type, category] = key.split('|');
    return {typeText:type==='income'?'收入':'支出', category, amount};
  }).sort((a,b)=>b.amount-a.amount);

  return {familyRows, settlements, categoryRows, totalExpense, totalIncome};
}
function buildSettlements(rows){
  const creditors = rows.filter(r=>r.net>0.005).map(r=>({...r, remain:r.net})).sort((a,b)=>b.remain-a.remain);
  const debtors = rows.filter(r=>r.net<-0.005).map(r=>({...r, remain:Math.abs(r.net)})).sort((a,b)=>b.remain-a.remain);
  const list=[]; let i=0, j=0;
  while(i<debtors.length && j<creditors.length){
    const d=debtors[i], c=creditors[j];
    const amt=Math.min(d.remain,c.remain);
    if(amt>0.005) list.push({from:d.familyName, to:c.familyName, amount:amt});
    d.remain-=amt; c.remain-=amt;
    if(d.remain<=0.005) i++;
    if(c.remain<=0.005) j++;
  }
  return list;
}
function renderBooks(){
  const box = document.getElementById('bookList');
  const activeId = appData.activeBookId;
  box.innerHTML = appData.books.map(b=>`
    <div class="book-item ${b.id===activeId?'active':''}">
      <div class="family-head">
        <div>
          <div class="family-name">${escapeHtml(b.bookName)}</div>
          <div class="mini">${escapeHtml(b.tripName || '未填旅程名稱')}</div>
        </div>
        <div class="btns">
          <button class="ghost" onclick="switchBook('${b.id}')">開啟</button>
          <button class="secondary" onclick="renameBook('${b.id}')">改名</button>
          <button class="danger" onclick="deleteBook('${b.id}')">刪除</button>
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('currentBookName').value = activeBook().bookName;
}
function renderBase(){
  const b = activeBook();
  document.getElementById('tripName').value = b.tripName || '';
  document.getElementById('currency').value = b.currency || 'NT$';
  document.getElementById('familySplitMode').value = b.familySplitMode || 'equal';
}
function renderFamilies(){
  const b = activeBook();
  const box = document.getElementById('familyList');
  if(b.families.length===0){ box.innerHTML = '<div class="muted">尚未新增家庭</div>'; return; }
  box.innerHTML = b.families.map(f=>`
    <div class="family">
      <div class="family-head">
        <div class="family-name">${escapeHtml(f.name)}</div>
        <div class="btns">
          <span class="pill">權重 ${Number(f.weight||1)}</span>
          <button class="danger" onclick="removeFamily('${f.id}')">刪除家庭</button>
        </div>
      </div>
      <div class="row">
        <div><label>家庭名稱</label><input value="${escapeHtml(f.name)}" oninput="updateFamilyName('${f.id}', this.value)"></div>
        <div><label>家庭權重</label><input type="number" min="0" step="0.1" value="${Number(f.weight||1)}" oninput="updateFamilyWeight('${f.id}', this.value)"></div>
      </div>
    </div>
  `).join('');
}
function renderEntries(){
  const b = activeBook();
  const box = document.getElementById('entryList');
  if(b.entries.length===0){ box.innerHTML = '<div class="muted">尚未新增收入或支出</div>'; return; }
  box.innerHTML = b.entries.map((e,idx)=>{
    const fam = b.families.find(f=>f.id===e.payerFamilyId);
    const parts = e.type==='expense' ? b.families.filter(f=>(e.participantFamilyIds||[]).includes(f.id)).map(f=>f.name).join('、') : '—';
    return `
      <div class="entry">
        <div class="entry-head">
          <div>
            <div class="entry-name">${idx+1}. ${escapeHtml(e.title)}</div>
            <div class="mini">
              <span class="tag ${e.type==='income'?'income':'expense'}">${e.type==='income'?'收入':'支出'}</span>
              分類：<span class="tag">${escapeHtml(e.category || '未分類')}</span>
              　家庭：${escapeHtml(fam?.name || '-')}
            </div>
          </div>
          <div class="btns">
            <span class="pill money">${money(e.amount)}</span>
            <button class="ghost" onclick="editEntry('${e.id}')">編輯</button>
            <button class="danger" onclick="removeEntry('${e.id}')">刪除</button>
          </div>
        </div>
        <div class="mini">${e.type==='income'?'收入歸屬家庭':'參與家庭'}：${escapeHtml(parts)}</div>
        ${e.note ? `<div class="mini" style="margin-top:6px">備註：${escapeHtml(e.note)}</div>` : ''}
      </div>
    `;
  }).join('');
}
function renderResults(){
  const b = activeBook();
  const {familyRows, settlements, categoryRows, totalExpense, totalIncome} = calculate();
  document.getElementById('summaryExpenseTotal').textContent = money(totalExpense);
  document.getElementById('summaryIncomeTotal').textContent = money(totalIncome);
  document.getElementById('summaryNetTotal').textContent = money(totalExpense-totalIncome);
  document.getElementById('summaryFamilyCount').textContent = b.families.length;
  document.getElementById('summaryEntryCount').textContent = b.entries.length;

  document.getElementById('categoryTable').innerHTML = categoryRows.length===0 ? '<div class="muted">無資料</div>' : `
    <table><thead><tr><th>類型</th><th>分類</th><th class="right">金額</th></tr></thead><tbody>
      ${categoryRows.map(r=>`<tr><td>${escapeHtml(r.typeText)}</td><td>${escapeHtml(r.category)}</td><td class="right money">${money(r.amount)}</td></tr>`).join('')}
    </tbody></table>`;

  document.getElementById('familyResultTable').innerHTML = familyRows.length===0 ? '<div class="muted">無資料</div>' : `
    <table><thead><tr><th>家庭</th><th class="right">支出付款</th><th class="right">支出分攤</th><th class="right">收入歸屬</th><th class="right">淨額</th></tr></thead><tbody>
      ${familyRows.map(r=>`<tr><td>${escapeHtml(r.familyName)}</td><td class="right money">${money(r.expensePaid)}</td><td class="right money">${money(r.expenseOwed)}</td><td class="right money">${money(r.incomeReceived)}</td><td class="right money ${r.net>=0?'positive':'negative'}">${money(r.net)}</td></tr>`).join('')}
    </tbody></table>`;

  document.getElementById('settlementList').innerHTML = settlements.length===0 ? '<div class="muted">目前無需轉帳</div>' : `
    <table><thead><tr><th>付款方</th><th>收款方</th><th class="right">金額</th></tr></thead><tbody>
      ${settlements.map(s=>`<tr><td>${escapeHtml(s.from)}</td><td>${escapeHtml(s.to)}</td><td class="right money">${money(s.amount)}</td></tr>`).join('')}
    </tbody></table>`;

  document.getElementById('lineTransferText').textContent = settlements.length===0 ? '目前無需轉帳' : settlements.map(s=>`${s.from} → ${s.to}：${money(s.amount)}`).join('\n');
}
function renderAll(){
  renderBooks();
  renderBase();
  renderFamilies();
  renderEntryInputs();
  renderEntries();
  renderResults();
  if(!editingId) clearEntryForm();
}
function exportJson(){
  const blob = new Blob([JSON.stringify(activeBook(), null, 2)], {type:'application/json;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${activeBook().bookName || '分帳表'}.json`;
  a.click();
}
function importJson(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      const b = defaultBook(data.bookName || file.name.replace(/\.json$/i, ''));
      Object.assign(b, data);
      b.id = uid();
      if(!b.entries) b.entries = [];
      if(!b.families) b.families = [];
      appData.books.push(b);
      appData.activeBookId = b.id;
      saveStorage();
      editingId = null;
      renderAll();
      alert('匯入完成，已建立新帳本');
    }catch(err){
      alert('匯入失敗，請確認 JSON 格式正確');
    }
    e.target.value = '';
  };
  reader.readAsText(file, 'utf-8');
}
function triggerImport(){ document.getElementById('importFile').click(); }
function exportCSV(){
  const b = activeBook();
  const {familyRows, settlements, categoryRows, totalExpense, totalIncome} = calculate();
  const lines = [];
  const csvCell = v => /[",\n]/.test(String(v ?? '')) ? `"${String(v).replace(/"/g,'""')}"` : String(v ?? '');
  const addSection = (title, rows) => { lines.push(title); rows.forEach(r => lines.push(r.map(csvCell).join(','))); lines.push(''); };
  addSection('總覽', [
    ['帳本名稱', b.bookName],
    ['旅程名稱', b.tripName || ''],
    ['幣別', b.currency || ''],
    ['總支出', totalExpense.toFixed(2)],
    ['總收入', totalIncome.toFixed(2)],
    ['淨支出', (totalExpense-totalIncome).toFixed(2)]
  ]);
  addSection('分類統計', [['類型','分類','金額']].concat(categoryRows.map(r=>[r.typeText, r.category, r.amount.toFixed(2)])));
  addSection('各家庭結算', [['家庭','支出付款','支出分攤','收入歸屬','淨額']].concat(familyRows.map(r=>[r.familyName, r.expensePaid.toFixed(2), r.expenseOwed.toFixed(2), r.incomeReceived.toFixed(2), r.net.toFixed(2)])));
  addSection('家庭間轉帳清單', [['付款方','收款方','金額']].concat(settlements.map(s=>[s.from, s.to, s.amount.toFixed(2)])));
  addSection('明細', [['類型','項目','分類','金額','家庭','參與家庭','備註']].concat(b.entries.map(e=>{
    const fam = b.families.find(f=>f.id===e.payerFamilyId);
    const parts = e.type==='expense' ? b.families.filter(f=>(e.participantFamilyIds||[]).includes(f.id)).map(f=>f.name).join('、') : '';
    return [e.type==='income'?'收入':'支出', e.title, e.category||'', Number(e.amount||0).toFixed(2), fam?.name||'', parts, e.note||''];
  })));
  const csv = '\ufeff' + lines.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${b.bookName || '分帳表'}.csv`;
  a.click();
}
function copyLineText(){
  navigator.clipboard.writeText(document.getElementById('lineTransferText').textContent).then(()=>alert('已複製 LINE 轉帳文字'));
}

document.getElementById('tripName').addEventListener('input', ()=>{ saveLocal(); renderResults(); renderBooks(); });
document.getElementById('currency').addEventListener('change', ()=>{ saveLocal(); renderResults(); });
document.getElementById('familySplitMode').addEventListener('change', ()=>{ saveLocal(); renderResults(); });
document.getElementById('entryType').addEventListener('change', onEntryTypeChange);

loadStorage();
renderAll();

window.addBook = addBook;
window.switchBook = switchBook;
window.renameBook = renameBook;
window.deleteBook = deleteBook;
window.resetCurrentBook = resetCurrentBook;
window.saveLocal = saveLocal;
window.addFamily = addFamily;
window.updateFamilyName = updateFamilyName;
window.updateFamilyWeight = updateFamilyWeight;
window.removeFamily = removeFamily;
window.saveEntry = saveEntry;
window.editEntry = editEntry;
window.removeEntry = removeEntry;
window.cancelEdit = cancelEdit;
window.exportJson = exportJson;
window.importJson = importJson;
window.triggerImport = triggerImport;
window.exportCSV = exportCSV;
window.copyLineText = copyLineText;
</script>
</body>
</html>
